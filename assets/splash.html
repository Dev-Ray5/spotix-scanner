<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotix Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 300px;
      background: #0e0218;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }

    .glow {
      position: absolute;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(107,47,165,0.22) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      margin-bottom: 18px;
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .app-title {
      color: #ffffff;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      animation: fadeUp 0.5s 0.15s ease forwards;
      opacity: 0;
    }

    .app-sub {
      color: rgba(167, 139, 188, 0.6);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeUp 0.5s 0.25s ease forwards;
      opacity: 0;
    }

    .status-row {
      height: 18px;
      margin-bottom: 14px;
      animation: fadeUp 0.5s 0.35s ease forwards;
      opacity: 0;
    }

    .status-text {
      font-size: 11px;
      color: #a78bbc;
      letter-spacing: 0.05em;
    }

    .cursor {
      display: inline-block;
      width: 5px;
      height: 11px;
      background: #6b2fa5;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.65s step-end infinite;
    }

    .bar-track {
      width: 180px;
      height: 2px;
      background: rgba(107, 47, 165, 0.18);
      border-radius: 2px;
      overflow: hidden;
      animation: fadeUp 0.5s 0.4s ease forwards;
      opacity: 0;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #6b2fa5;
      border-radius: 2px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .version {
      position: absolute;
      bottom: 12px;
      font-size: 10px;
      color: rgba(167, 139, 188, 0.35);
      letter-spacing: 0.07em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="logo-wrap">
    <img src="./splash.svg" alt="Spotix" draggable="false" />
  </div>

  <div class="app-title">Spotix Scanner</div>
  <div class="app-sub">Professional Check-in System</div>

  <div class="status-row">
    <span class="status-text" id="statusText"></span>
    <span class="cursor" id="cursor"></span>
  </div>

  <div class="bar-track">
    <div class="bar-fill" id="barFill"></div>
  </div>

  <div class="version" id="version">v1.0.0</div>

  <script>
    // Version is injected via query param: splash.html?v=1.2.3
    const params = new URLSearchParams(window.location.search);
    const v = params.get('v');
    if (v) document.getElementById('version').textContent = 'v' + v;

    const lines = [
      { text: 'Loading Spotix Scanner', progress: 12 },
      { text: 'Starting local server',  progress: 55 },
      { text: 'Connecting database',    progress: 90 },
    ];

    const statusEl = document.getElementById('statusText');
    const barFill  = document.getElementById('barFill');

    let lineIndex = 0;
    let charIndex = 0;

    function typeNext() {
      if (lineIndex >= lines.length) return;
      const line = lines[lineIndex];

      if (charIndex === 0) {
        barFill.style.width = line.progress + '%';
      }

      if (charIndex < line.text.length) {
        statusEl.textContent = line.text.slice(0, charIndex + 1);
        charIndex++;
        setTimeout(typeNext, 36);
      } else {
        setTimeout(() => {
          statusEl.style.transition = 'opacity 0.25s';
          statusEl.style.opacity = '0';
          setTimeout(() => {
            lineIndex++;
            charIndex = 0;
            statusEl.style.opacity = '1';
            typeNext();
          }, 280);
        }, 850);
      }
    }

    setTimeout(typeNext, 600);
  </script>
</body>
</html>
